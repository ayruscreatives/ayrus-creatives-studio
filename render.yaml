services:
  - type: web
    name: ayrus-creatives
    env: node
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PERSISTENT_DIR
        value: /opt/render/data
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    disk:
      name: appdata
      mountPath: /opt/render/data
      sizeGB: 1
